<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Confirmed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}?v=1.1"
    />
    <script
      type="text/babel"
      src="{{ url_for('static', filename='loading.js') }}"
    ></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>

    <style>
      :root {
          --flavor-color: {{ color }};
          --glow: {{ color }}33;
      }

      body {
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          margin: 0;
          background-color: var(--bg);
      }

      .receipt-container {
          position: relative;
          width: min(400px, 90vw);
          background: rgba(30, 33, 30, 0.8);
          backdrop-filter: blur(20px);
          border: 1px solid var(--border);
          border-radius: var(--radius);
          padding: 3rem 2rem;
          text-align: center;
          box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 40px var(--glow);
          animation: fadeSlideIn 0.6s var(--transition) both;
      }

      /* The Animated Checkmark */
      .success-icon {
          font-size: 3.5rem;
          color: var(--flavor-color);
          margin-bottom: 1.5rem;
          display: block;
          text-shadow: 0 0 20px var(--glow);
          animation: checkPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .receipt-title {
          font-family: var(--font-display);
          font-size: 2.2rem;
          letter-spacing: 0.1em;
          color: var(--text);
          margin-bottom: 0.5rem;
          text-transform: uppercase;
      }

      .receipt-flavor {
          font-family: var(--font-display);
          font-size: 3rem;
          color: var(--flavor-color);
          margin: 1rem 0;
          line-height: 1;
          text-shadow: 0 0 15px var(--glow);
      }

      .receipt-details {
          font-family: var(--font-mono);
          font-size: 0.85rem;
          color: var(--muted);
          border-top: 1px dashed var(--border);
          border-bottom: 1px dashed var(--border);
          padding: 1.5rem 0;
          margin: 2rem 0;
      }

      .price-total {
          font-size: 1.5rem;
          color: var(--text);
          margin-top: 0.5rem;
      }

      /* Button Group */
      .action-group {
          display: flex;
          flex-direction: column;
          gap: 12px;
      }

      .btn-primary {
          background: var(--flavor-color);
          color: white;
          padding: 1rem;
          text-decoration: none;
          font-family: var(--font-display);
          font-size: 1.2rem;
          letter-spacing: 0.15em;
          border-radius: 8px;
          transition: transform 0.2s, box-shadow 0.2s;
          box-shadow: 0 4px 15px var(--glow);
      }

      .btn-primary:hover {
          transform: translateY(-2px);
          box-shadow: 0 8px 25px var(--glow);
      }

      .btn-secondary {
          color: var(--muted);
          text-decoration: none;
          font-family: var(--font-mono);
          font-size: 0.75rem;
          text-transform: uppercase;
          letter-spacing: 0.1em;
          padding: 0.5rem;
      }

      .btn-secondary:hover { color: var(--text); }
    </style>
  </head>
  <body>
    <div
      class="bg-glow"
      style="
        background: radial-gradient(
          circle at 50% 50%,
          var(--glow) 0%,
          transparent 70%
        );
      "
    ></div>

    <div class="receipt-container">
      <span class="success-icon">✓</span>
      <h1 class="receipt-title">Order Confirmed</h1>

      <p class="log-label" style="font-size: 0.65rem">Item Dispensed</p>
      <div class="receipt-flavor">{{ qty }}x {{ flavor }}</div>

      <div class="receipt-details">
        <div style="display: flex; justify-content: space-between">
          <span>Unit Price</span>
          <span>$5.00</span>
        </div>
        <div
          style="display: flex; justify-content: space-between"
          class="price-total"
        >
          <span>TOTAL</span>
          <span>${{ (qty | int * 5.0) | round(2) }}</span>
        </div>
      </div>

      <div class="action-group">
        <a href="/" class="btn-primary">ORDER AGAIN</a>
        <a href="/about" class="btn-secondary">ABOUT</a>
      </div>

      <p
        style="
          margin-top: 2rem;
          font-size: 0.6rem;
          color: #444;
          font-family: var(--font-mono);
        "
      >
        TRANS_ID: {{ range(10000, 99999) | random }} | STATUS: DELIVERED
      </p>
    </div>
  </body>
</html>
