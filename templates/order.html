<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Confirmed - Slushie Lab</title>
    <meta name="title" content="Order Confirmed - Slushie Lab" />
    <meta
      name="description"
      content="Your slushie order has been confirmed and is on its way! Check out your receipt for details and track your delivery status."
    />

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <!-- link-css -->

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <style>
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        gap: 0;
      }
      .trans-id {
        margin-top: 2rem;
        font-size: 0.57rem;
        color: #333;
        font-family: var(--font-m);
        letter-spacing: 0.12em;
      }
      .brand, .brand-word {
        font-family: var(--font-d);
        text-transform: lowercase;
        letter-spacing: 0.14em;
      }
    </style>
  </head>
  <body>
    <div class="bg-glow" id="bgGlow"></div>

    <div class="receipt-container">
      <span class="success-icon" id="checkIcon">✓</span>
      <h1 class="receipt-title">Order Confirmed</h1>

      <p
        class="log-label"
        style="
          font-size: 0.62rem;
          letter-spacing: 0.2em;
          text-transform: uppercase;
          color: var(--muted);
          margin-bottom: 0.25rem;
        "
      >
        Item Dispensed
      </p>
      <div class="receipt-flavor" id="receiptFlavor">—</div>

      <div class="receipt-details">
        <div
          style="
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
          "
        >
          <span>Unit Price</span>
          <span>$5.00</span>
        </div>
        <div
          style="display: flex; justify-content: space-between"
          class="price-total"
        >
          <span>TOTAL</span>
          <span id="receiptTotal">$5.00</span>
        </div>
      </div>

      <div class="action-group">
        <a href="/" class="btn-primary" id="orderAgainBtn">ORDER AGAIN</a>
        <a href="/about" class="btn-secondary">ABOUT</a>
      </div>

      <p class="trans-id" id="transId">TRANS_ID: — | STATUS: DELIVERED</p>
    </div>

    <script>

      const params = new URLSearchParams(window.location.search);
      const flavor  = params.get("flavor") || "Mystery";
      const color   = params.get("color")  || sessionStorage.getItem("slushielab_active_color") || "#ff2d2d";
      const qty     = Math.max(1, parseInt(params.get("qty") || "1"));
      const total   = (qty * 5).toFixed(2);
      const transId = Math.floor(Math.random() * 90000) + 10000;

      document.getElementById("receiptFlavor").textContent = qty + "x " + flavor;
      document.getElementById("receiptFlavor").style.color = color;
      document.getElementById("receiptTotal").textContent  = "$" + total;
      document.getElementById("transId").textContent       = "TRANS_ID: " + transId + " | STATUS: DELIVERED";

      const hex = color.replace("#", "");
      const r = parseInt(hex.slice(0, 2), 16) || 255;
      const g = parseInt(hex.slice(2, 4), 16) || 45;
      const b = parseInt(hex.slice(4, 6), 16) || 45;

      document.documentElement.style.setProperty("--accent",      color);
      document.documentElement.style.setProperty("--accent-glow", `rgba(${r},${g},${b},0.38)`);

      document.getElementById("bgGlow").style.background =
        `radial-gradient(circle at 50% 50%, rgba(${r},${g},${b},0.1) 0%, transparent 70%)`;

      document.querySelector(".receipt-container").style.boxShadow =
        `0 25px 60px rgba(0,0,0,0.5), 0 0 50px rgba(${r},${g},${b},0.2)`;

      document.getElementById("orderAgainBtn").style.background  = color;
      document.getElementById("orderAgainBtn").style.boxShadow   = `0 4px 20px rgba(${r},${g},${b},0.45)`;
      document.getElementById("checkIcon").style.color            = color;
      document.getElementById("checkIcon").style.textShadow      = `0 0 24px rgba(${r},${g},${b},0.6)`;

      sessionStorage.setItem("slushielab_active_color", color);
      if (flavor !== "Mystery") sessionStorage.setItem("slushielab_active_name", flavor);

      const style = document.createElement("style");
      style.textContent = `::selection{background:${color};color:#fff}::-moz-selection{background:${color};color:#fff}`;
      document.head.appendChild(style);
    </script>
  </body>
</html>
